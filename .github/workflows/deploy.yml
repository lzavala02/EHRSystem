name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run quick-share smoke test
        working-directory: frontend
        run: npm test -- --runInBand src/pages/provider/QuickSharePage.test.tsx

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: frontend-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        shell: bash
        run: |
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=${{ env.REGISTRY }}/${OWNER_LOWER}/ehrsystem" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Trigger cloud deployment hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          IMAGE_LATEST: ${{ steps.image.outputs.name }}:latest
          IMAGE_SHA: ${{ steps.image.outputs.name }}:${{ github.sha }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing secret DEPLOY_HOOK_URL"
            exit 1
          fi

          curl -fsS -X POST "$DEPLOY_HOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"image_latest\":\"${IMAGE_LATEST}\",\"image_sha\":\"${IMAGE_SHA}\"}"
